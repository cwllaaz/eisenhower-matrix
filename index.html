<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四象限任务管理 - 完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;padding:20px;background:#f5f5f5;transition:all .3s}
body.dark{background:#1a1a1a;color:#e0e0e0}
.header{max-width:1200px;margin:0 auto 20px}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px}
h1{color:#333;font-size:24px}
body.dark h1{color:#e0e0e0}
.tools{display:flex;gap:10px;flex-wrap:wrap}
.tools button{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:14px;transition:all .2s}
.export-btn{background:#3498db;color:#fff}
.import-btn{background:#9b59b6;color:#fff}
.theme-btn{background:#34495e;color:#fff}
.undo-btn{background:#e67e22;color:#fff}
.undo-btn:disabled{background:#bdc3c7;cursor:not-allowed}
.batch-btn{background:#16a085;color:#fff}
.batch-btn.active{background:#c0392b}
.stats{display:flex;gap:20px;padding:10px;background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.1);flex-wrap:wrap}
body.dark .stats{background:#2d2d2d}
.stat-item{display:flex;align-items:center;gap:8px;font-size:14px}
.stat-label{color:#7f8c8d}
.stat-value{font-weight:700;color:#2c3e50}
body.dark .stat-value{color:#ecf0f1}
.search-bar{margin:15px 0}
.search-bar input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:14px}
body.dark .search-bar input{background:#2d2d2d;border-color:#444;color:#e0e0e0}
.filter-bar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.filter-tag{padding:8px 16px;border:2px solid #3498db;border-radius:20px;cursor:pointer;font-size:13px;background:#fff;transition:all .2s}
.filter-tag.active{background:#3498db;color:#fff}
body.dark .filter-tag{background:#2d2d2d;color:#e0e0e0}
body.dark .filter-tag.active{background:#3498db;color:#fff}
.container{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:1200px;margin:0 auto}
.quadrant{background:#fff;border-radius:8px;padding:15px;min-height:400px;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:all .3s}
body.dark .quadrant{background:#2d2d2d}
.quadrant h2{font-size:18px;margin-bottom:10px;padding-bottom:10px;border-bottom:2px solid;display:flex;justify-content:space-between}
.q1 h2{color:#e74c3c;border-color:#e74c3c}
.q2 h2{color:#3498db;border-color:#3498db}
.q3 h2{color:#f39c12;border-color:#f39c12}
.q4 h2{color:#95a5a6;border-color:#95a5a6}
.count-badge{font-size:12px;background:#ecf0f1;color:#7f8c8d;padding:2px 8px;border-radius:10px;font-weight:400}
.tasks{min-height:300px}
.empty-state{text-align:center;color:#bbb;padding:40px 20px;font-size:14px}
.task{background:#fafafa;padding:10px;margin:8px 0;border-radius:4px;cursor:move;border-left:3px solid;transition:all .2s;position:relative}
body.dark .task{background:#3a3a3a}
.task.completed{opacity:.6}
.task.completed .task-text{text-decoration:line-through}
.task.selected{background:#d5f4e6}
.task.hidden{display:none}
.q1 .task{border-color:#e74c3c}
.q2 .task{border-color:#3498db}
.q3 .task{border-color:#f39c12}
.q4 .task{border-color:#95a5a6}
.task:hover{background:#f0f0f0}
body.dark .task:hover{background:#444}
.task.dragging{opacity:.5}
.task-header{display:flex;justify-content:space-between;gap:10px}
.task-left{flex:1;display:flex;gap:8px;align-items:flex-start}
.task-checkbox{width:18px;height:18px;cursor:pointer;margin-top:2px}
.task-content{flex:1}
.task-text{word-break:break-word;margin-bottom:4px}
.task-meta{font-size:11px;color:#95a5a6;display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.tag-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-work{background:#3498db;color:#fff}
.tag-life{background:#2ecc71;color:#fff}
.tag-study{background:#9b59b6;color:#fff}
.tag-other{background:#95a5a6;color:#fff}
.deadline-badge{padding:2px 8px;border-radius:10px;font-size:10px;background:#e8f5e9;color:#27ae60;font-weight:600}
.deadline-soon{background:#fff3e0;color:#f39c12}
.deadline-overdue{background:#ffebee;color:#e74c3c}
.task.urgent{border-left-width:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.08)}50%{box-shadow:0 4px 16px rgba(231,76,60,.4)}}
.task-actions{display:flex;gap:5px;opacity:0;transition:opacity .2s}
.task:hover .task-actions{opacity:1}
.task-btn{background:0 0;border:none;cursor:pointer;padding:4px 8px;border-radius:3px;font-size:12px}
.detail-btn{color:#9b59b6}
.edit-btn{color:#3498db}
.delete-btn{color:#e74c3c}
.add-section{margin-top:10px}
.add-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;display:none}
body.dark .add-input{background:#3a3a3a;border-color:#555;color:#e0e0e0}
.add-input.active{display:block;margin-bottom:8px}
.add-btn{width:100%;padding:10px;background:#2ecc71;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px}
.quadrant.drag-over{background:#e8f5e9}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal.active{display:flex}
.modal-content{background:#fff;padding:20px;border-radius:8px;max-width:500px;width:90%}
body.dark .modal-content{background:#2d2d2d}
.modal-content h3{margin-bottom:15px}
.modal-content input,.modal-content textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:15px;font-family:inherit}
body.dark .modal-content input,body.dark .modal-content textarea{background:#3a3a3a;border-color:#555;color:#e0e0e0}
.modal-content textarea{min-height:100px;resize:vertical}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.modal-actions button{padding:8px 16px;border:none;border-radius:4px;cursor:pointer}
.confirm-btn{background:#2ecc71;color:#fff}
.cancel-btn{background:#95a5a6;color:#fff}
@media (max-width:768px){
body{padding:10px}
.container{grid-template-columns:1fr}
.top-bar{flex-direction:column;align-items:stretch}
h1{font-size:20px;text-align:center}
.tools{justify-content:center}
.stats{justify-content:center}
.quadrant{min-height:250px}
}
</style>
</head>
<body>
<div class="header">
<div class="top-bar">
<h1>四象限任务管理工具</h1>
<div class="tools">
<button class="theme-btn" onclick="toggleTheme()">🌓 主题</button>
<button class="undo-btn" onclick="undo()" id="undoBtn" disabled>↶ 撤销</button>
<button class="batch-btn" onclick="toggleBatch()" id="batchBtn">☑ 批量</button>
<button class="pomodoro-btn" style="background:#e74c3c;color:#fff" onclick="showPomodoro()">🍅 番茄钟</button>
<button class="review-btn" style="background:#8e44ad;color:#fff" onclick="showReview()">📋 今日回顾</button>
<button class="calendar-btn" style="background:#27ae60;color:#fff" onclick="showCalendar()">📅 日历</button>
<button class="summary-btn" style="background:#f39c12;color:#fff" onclick="showSummary()">📝 每日总结</button>
<button class="export-btn" onclick="exportData()">导出</button>
<button class="import-btn" onclick="document.getElementById('importFile').click()">导入</button>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>
</div>
<div class="stats">
<div class="stat-item"><span class="stat-label">总任务:</span> <span class="stat-value" id="totalCount">0</span></div>
<div class="stat-item"><span class="stat-label">重要紧急:</span> <span class="stat-value" id="q1Count">0</span></div>
<div class="stat-item"><span class="stat-label">重要不紧急:</span> <span class="stat-value" id="q2Count">0</span></div>
<div class="stat-item"><span class="stat-label">紧急不重要:</span> <span class="stat-value" id="q3Count">0</span></div>
<div class="stat-item"><span class="stat-label">不重要不紧急:</span> <span class="stat-value" id="q4Count">0</span></div>
<div class="stat-item"><span class="stat-label">已完成:</span> <span class="stat-value" id="completedCount">0</span></div>
</div>
<div class="search-bar">
<input type="text" id="searchInput" placeholder="🔍 搜索任务... (快捷键: Ctrl+F)" onkeyup="searchTasks()">
</div>
<div class="filter-bar" style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap">
<button class="filter-tag active" onclick="filterByTag('')" data-tag="">全部</button>
<button class="filter-tag" onclick="filterByTag('work')" data-tag="work">🏢 工作</button>
<button class="filter-tag" onclick="filterByTag('life')" data-tag="life">🏠 生活</button>
<button class="filter-tag" onclick="filterByTag('study')" data-tag="study">📚 学习</button>
<button class="filter-tag" onclick="filterByTag('other')" data-tag="other">📌 其他</button>
</div>
</div>
<div class="container">
<div class="quadrant q1" data-quadrant="q1">
<h2>重要且紧急 <span class="count-badge" id="badge-q1">0</span></h2>
<div class="tasks"></div>
<div class="add-section">
<input type="text" class="add-input" placeholder="输入任务，按回车添加" data-quadrant="q1">
<button class="add-btn" onclick="showAddInput('q1')">+ 添加任务</button>
</div>
</div>
<div class="quadrant q2" data-quadrant="q2">
<h2>重要不紧急 <span class="count-badge" id="badge-q2">0</span></h2>
<div class="tasks"></div>
<div class="add-section">
<input type="text" class="add-input" placeholder="输入任务，按回车添加" data-quadrant="q2">
<button class="add-btn" onclick="showAddInput('q2')">+ 添加任务</button>
</div>
</div>
<div class="quadrant q3" data-quadrant="q3">
<h2>紧急不重要 <span class="count-badge" id="badge-q3">0</span></h2>
<div class="tasks"></div>
<div class="add-section">
<input type="text" class="add-input" placeholder="输入任务，按回车添加" data-quadrant="q3">
<button class="add-btn" onclick="showAddInput('q3')">+ 添加任务</button>
</div>
</div>
<div class="quadrant q4" data-quadrant="q4">
<h2>不重要不紧急 <span class="count-badge" id="badge-q4">0</span></h2>
<div class="tasks"></div>
<div class="add-section">
<input type="text" class="add-input" placeholder="输入任务，按回车添加" data-quadrant="q4">
<button class="add-btn" onclick="showAddInput('q4')">+ 添加任务</button>
</div>
</div>
</div>
<div class="modal" id="editModal">
<div class="modal-content">
<h3>编辑任务</h3>
<input type="text" id="editInput">
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">取消</button>
<button class="confirm-btn" onclick="confirmEdit()">确定</button>
</div>
</div>
</div>
<div class="modal" id="detailModal">
<div class="modal-content">
<h3>任务详情</h3>
<input type="text" id="detailTitle" placeholder="任务标题">
<textarea id="detailDesc" placeholder="任务描述（可选）"></textarea>
<label style="display:block;margin-bottom:5px;color:#7f8c8d;font-size:12px">截止日期</label>
<input type="datetime-local" id="detailDeadline" style="margin-bottom:15px">
<label style="display:block;margin-bottom:5px;color:#7f8c8d;font-size:12px">标签</label>
<select id="detailTag" style="margin-bottom:15px">
<option value="">无标签</option>
<option value="work">🏢 工作</option>
<option value="life">🏠 生活</option>
<option value="study">📚 学习</option>
<option value="other">📌 其他</option>
</select>
<label style="display:block;margin-bottom:5px;color:#7f8c8d;font-size:12px">附件链接</label>
<input type="text" id="detailAttachment" placeholder="https://..." style="margin-bottom:15px">
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">取消</button>
<button class="confirm-btn" onclick="confirmDetail()">保存</button>
</div>
</div>
</div>
<div class="modal" id="deleteModal">
<div class="modal-content">
<h3>确认删除</h3>
<p>确定要删除这个任务吗？</p>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">取消</button>
<button class="confirm-btn" onclick="confirmDelete()">删除</button>
</div>
</div>
</div>
<div class="modal" id="pomodoroModal">
<div class="modal-content">
<h3>🍅 番茄钟</h3>
<div style="text-align:center;padding:30px">
<div id="pomodoroDisplay" style="font-size:48px;font-weight:700;margin:20px 0">25:00</div>
<div style="display:flex;gap:10px;justify-content:center">
<button onclick="startPomodoro()" style="padding:12px 24px;background:#27ae60;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600">开始</button>
<button onclick="pausePomodoro()" style="padding:12px 24px;background:#f39c12;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600">暂停</button>
<button onclick="resetPomodoro()" style="padding:12px 24px;background:#e74c3c;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600">重置</button>
</div>
</div>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">关闭</button>
</div>
</div>
</div>
<div class="modal" id="reviewModal">
<div class="modal-content">
<h3>📋 今日回顾</h3>
<div id="reviewContent" style="max-height:400px;overflow-y:auto"></div>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">关闭</button>
</div>
</div>
</div>
<div class="modal" id="calendarModal">
<div class="modal-content" style="max-width:800px">
<h3>📅 任务日历</h3>
<div id="calendarContent" style="padding:20px"></div>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">关闭</button>
</div>
</div>
</div>
<div class="modal" id="summaryModal">
<div class="modal-content">
<h3>📝 每日总结</h3>
<input type="date" id="summaryDate" style="margin-bottom:10px">
<textarea id="summaryText" placeholder="写下今天的总结..." style="min-height:200px"></textarea>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">取消</button>
<button class="confirm-btn" onclick="saveSummary()">保存</button>
</div>
</div>
</div>
<script>
let tasks=JSON.parse(localStorage.getItem('tasks'))||{q1:[],q2:[],q3:[],q4:[]};
let history=[];
let batchMode=false;
let selected=[];
let draggedTask=null;
let draggedInQuadrant=null;
let editingTask=null;
let deletingTask=null;
let detailTask=null;
let currentFilter='';
let pomodoroTimer=null;
let pomodoroSeconds=1500;
let pomodoroRunning=false;
let summaries=JSON.parse(localStorage.getItem('summaries'))||{};

function saveState(){
history.push(JSON.stringify(tasks));
if(history.length>20)history.shift();
document.getElementById('undoBtn').disabled=false;
}

function undo(){
if(history.length>0){
tasks=JSON.parse(history.pop());
saveTasks();
renderTasks();
if(history.length===0)document.getElementById('undoBtn').disabled=true;
}
}

function saveTasks(){
localStorage.setItem('tasks',JSON.stringify(tasks));
}

function updateStats(){
let total=0,completed=0;
['q1','q2','q3','q4'].forEach(q=>{
let count=tasks[q].length;
total+=count;
completed+=tasks[q].filter(t=>t.completed).length;
document.getElementById(q+'Count').textContent=count;
document.getElementById('badge-'+q).textContent=count;
});
document.getElementById('totalCount').textContent=total;
document.getElementById('completedCount').textContent=completed;
}

function renderTasks(){
['q1','q2','q3','q4'].forEach(q=>{
const container=document.querySelector(`[data-quadrant="${q}"] .tasks`);
container.innerHTML='';
if(tasks[q].length===0){
container.innerHTML='<div class="empty-state">暂无任务，点击下方按钮添加</div>';
return;
}
tasks[q].forEach((task,index)=>{
const div=document.createElement('div');
div.className='task'+(task.completed?' completed':'')+(selected.includes(q+'-'+index)?' selected':'');
div.draggable=true;
div.dataset.quadrant=q;
div.dataset.index=index;

const header=document.createElement('div');
header.className='task-header';

const left=document.createElement('div');
left.className='task-left';

if(batchMode){
const checkbox=document.createElement('input');
checkbox.type='checkbox';
checkbox.className='task-checkbox';
checkbox.checked=selected.includes(q+'-'+index);
checkbox.onclick=()=>toggleSelect(q,index);
left.appendChild(checkbox);
}else{
const checkbox=document.createElement('input');
checkbox.type='checkbox';
checkbox.className='task-checkbox';
checkbox.checked=task.completed||false;
checkbox.onclick=()=>toggleComplete(q,index);
left.appendChild(checkbox);
}

const content=document.createElement('div');
content.className='task-content';
const text=document.createElement('div');
text.className='task-text';
text.textContent=task.text||task;
content.appendChild(text);
const meta=document.createElement('div');
meta.className='task-meta';
if(task.deadline){
const now=new Date();
const deadline=new Date(task.deadline);
const hours=(deadline-now)/3600000;
const badge=document.createElement('span');
badge.className='deadline-badge';
if(hours<0)badge.classList.add('deadline-overdue');
else if(hours<24)badge.classList.add('deadline-soon');
badge.textContent='⏰ '+deadline.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'numeric',minute:'numeric'});
meta.appendChild(badge);
if(hours<24&&hours>0)div.classList.add('urgent');
}
if(task.tag){
const tagMap={work:'🏢 工作',life:'🏠 生活',study:'📚 学习',other:'📌 其他'};
const badge=document.createElement('span');
badge.className='tag-badge tag-'+task.tag;
badge.textContent=tagMap[task.tag]||task.tag;
meta.appendChild(badge);
}
if(task.attachment){
const link=document.createElement('a');
link.href=task.attachment;
link.target='_blank';
link.style.cssText='font-size:10px;color:#3498db;text-decoration:none';
link.textContent='📎 附件';
meta.appendChild(link);
}
if(task.createdAt){
const time=document.createElement('span');
time.textContent=new Date(task.createdAt).toLocaleString('zh-CN',{month:'numeric',day:'numeric'});
meta.appendChild(time);
}
if(meta.children.length>0)content.appendChild(meta);
if(currentFilter&&task.tag!==currentFilter)div.classList.add('hidden');
left.appendChild(content);
header.appendChild(left);

const actions=document.createElement('div');
actions.className='task-actions';
const detailBtn=document.createElement('button');
detailBtn.className='task-btn detail-btn';
detailBtn.textContent='详情';
detailBtn.onclick=()=>showDetail(q,index);
const editBtn=document.createElement('button');
editBtn.className='task-btn edit-btn';
editBtn.textContent='编辑';
editBtn.onclick=()=>showEdit(q,index);
const deleteBtn=document.createElement('button');
deleteBtn.className='task-btn delete-btn';
deleteBtn.textContent='删除';
deleteBtn.onclick=()=>showDelete(q,index);
actions.appendChild(detailBtn);
actions.appendChild(editBtn);
actions.appendChild(deleteBtn);
header.appendChild(actions);

div.appendChild(header);

div.ondragstart=e=>{
draggedTask={quadrant:q,index};
draggedInQuadrant=q;
div.classList.add('dragging');
};
div.ondragend=()=>{
div.classList.remove('dragging');
draggedTask=null;
draggedInQuadrant=null;
};
div.ondragover=e=>{
e.preventDefault();
if(draggedInQuadrant===q&&draggedTask.index!==index){
const rect=div.getBoundingClientRect();
const mid=rect.top+rect.height/2;
if(e.clientY<mid){
container.insertBefore(document.querySelector('.dragging'),div);
}else{
container.insertBefore(document.querySelector('.dragging'),div.nextSibling);
}
}
};

container.appendChild(div);
});
});
updateStats();
}

function toggleComplete(q,index){
saveState();
if(typeof tasks[q][index]==='string'){
tasks[q][index]={text:tasks[q][index],completed:true,completedAt:Date.now(),createdAt:Date.now()};
}else{
tasks[q][index].completed=!tasks[q][index].completed;
if(tasks[q][index].completed){
tasks[q][index].completedAt=Date.now();
}
}
saveTasks();
renderTasks();
}

function toggleSelect(q,index){
const key=q+'-'+index;
const idx=selected.indexOf(key);
if(idx>-1)selected.splice(idx,1);
else selected.push(key);
renderTasks();
}

function toggleBatch(){
batchMode=!batchMode;
selected=[];
document.getElementById('batchBtn').classList.toggle('active');
renderTasks();
}

function showAddInput(q){
const input=document.querySelector(`[data-quadrant="${q}"] .add-input`);
input.classList.add('active');
input.focus();
input.onkeydown=e=>{
if(e.key==='Enter'&&input.value.trim()){
saveState();
tasks[q].push({text:input.value.trim(),completed:false,createdAt:Date.now()});
saveTasks();
renderTasks();
input.value='';
input.classList.remove('active');
}else if(e.key==='Escape'){
input.value='';
input.classList.remove('active');
}
};
}

function showEdit(q,index){
editingTask={q,index};
const task=tasks[q][index];
document.getElementById('editInput').value=task.text||task;
document.getElementById('editModal').classList.add('active');
document.getElementById('editInput').focus();
}

function confirmEdit(){
if(editingTask){
saveState();
const val=document.getElementById('editInput').value.trim();
if(val){
if(typeof tasks[editingTask.q][editingTask.index]==='string'){
tasks[editingTask.q][editingTask.index]={text:val,completed:false,createdAt:Date.now()};
}else{
tasks[editingTask.q][editingTask.index].text=val;
}
saveTasks();
renderTasks();
}
}
closeModal();
}

function showDetail(q,index){
detailTask={q,index};
const task=tasks[q][index];
document.getElementById('detailTitle').value=task.text||task;
document.getElementById('detailDesc').value=task.desc||'';
document.getElementById('detailDeadline').value=task.deadline||'';
document.getElementById('detailTag').value=task.tag||'';
document.getElementById('detailAttachment').value=task.attachment||'';
document.getElementById('detailModal').classList.add('active');
document.getElementById('detailTitle').focus();
}

function confirmDetail(){
if(detailTask){
saveState();
const title=document.getElementById('detailTitle').value.trim();
const desc=document.getElementById('detailDesc').value.trim();
const deadline=document.getElementById('detailDeadline').value;
const tag=document.getElementById('detailTag').value;
const attachment=document.getElementById('detailAttachment').value.trim();
if(title){
if(typeof tasks[detailTask.q][detailTask.index]==='string'){
tasks[detailTask.q][detailTask.index]={text:title,desc,deadline,tag,attachment,completed:false,createdAt:Date.now()};
}else{
tasks[detailTask.q][detailTask.index].text=title;
tasks[detailTask.q][detailTask.index].desc=desc;
tasks[detailTask.q][detailTask.index].deadline=deadline;
tasks[detailTask.q][detailTask.index].tag=tag;
tasks[detailTask.q][detailTask.index].attachment=attachment;
}
saveTasks();
renderTasks();
}
}
closeModal();
}

function showDelete(q,index){
deletingTask={q,index};
document.getElementById('deleteModal').classList.add('active');
}

function confirmDelete(){
if(deletingTask){
saveState();
tasks[deletingTask.q].splice(deletingTask.index,1);
saveTasks();
renderTasks();
}
closeModal();
}

function closeModal(){
document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
editingTask=null;
deletingTask=null;
detailTask=null;
}

function searchTasks(){
const query=document.getElementById('searchInput').value.toLowerCase();
document.querySelectorAll('.task').forEach(task=>{
const text=task.querySelector('.task-text').textContent.toLowerCase();
task.classList.toggle('hidden',query&&!text.includes(query));
});
}

function toggleTheme(){
document.body.classList.toggle('dark');
localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
}

function exportData(){
const dataStr=JSON.stringify(tasks,null,2);
const blob=new Blob([dataStr],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download=`tasks-${new Date().toISOString().split('T')[0]}.json`;
a.click();
URL.revokeObjectURL(url);
}

function importData(event){
const file=event.target.files[0];
if(file){
const reader=new FileReader();
reader.onload=e=>{
try{
const imported=JSON.parse(e.target.result);
if(imported.q1&&imported.q2&&imported.q3&&imported.q4){
saveState();
tasks=imported;
saveTasks();
renderTasks();
alert('数据导入成功！');
}else{
alert('文件格式不正确');
}
}catch(err){
alert('文件解析失败');
}
};
reader.readAsText(file);
}
}

document.querySelectorAll('.quadrant').forEach(q=>{
q.ondragover=e=>{
e.preventDefault();
q.classList.add('drag-over');
};
q.ondragleave=()=>q.classList.remove('drag-over');
q.ondrop=e=>{
e.preventDefault();
q.classList.remove('drag-over');
if(draggedTask){
const targetQuadrant=q.dataset.quadrant;
if(draggedInQuadrant===targetQuadrant){
const container=q.querySelector('.tasks');
const allTasks=Array.from(container.querySelectorAll('.task'));
const newOrder=allTasks.map(t=>parseInt(t.dataset.index));
const reordered=newOrder.map(i=>tasks[targetQuadrant][i]);
saveState();
tasks[targetQuadrant]=reordered;
saveTasks();
renderTasks();
}else{
const task=tasks[draggedTask.quadrant][draggedTask.index];
saveState();
tasks[draggedTask.quadrant].splice(draggedTask.index,1);
tasks[targetQuadrant].push(task);
saveTasks();
renderTasks();
}
}
};
});

document.addEventListener('keydown',e=>{
if(e.ctrlKey&&e.key==='f'){
e.preventDefault();
document.getElementById('searchInput').focus();
}
if(e.key==='Escape'){
closeModal();
document.querySelectorAll('.add-input').forEach(i=>i.classList.remove('active'));
}
if(e.key==='n'&&!e.ctrlKey&&!e.altKey&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){
showAddInput('q1');
}
});

if(localStorage.getItem('theme')==='dark'){
document.body.classList.add('dark');
}

function filterByTag(tag){
currentFilter=tag;
document.querySelectorAll('.filter-tag').forEach(btn=>{
btn.classList.toggle('active',btn.dataset.tag===tag);
});
renderTasks();
}

function showPomodoro(){
document.getElementById('pomodoroModal').classList.add('active');
}

function startPomodoro(){
if(!pomodoroRunning){
pomodoroRunning=true;
pomodoroTimer=setInterval(()=>{
pomodoroSeconds--;
const mins=Math.floor(pomodoroSeconds/60);
const secs=pomodoroSeconds%60;
document.getElementById('pomodoroDisplay').textContent=`${mins}:${secs.toString().padStart(2,'0')}`;
if(pomodoroSeconds<=0){
clearInterval(pomodoroTimer);
pomodoroRunning=false;
pomodoroSeconds=1500;
if(Notification.permission==='granted'){
new Notification('🍅 番茄钟',{body:'25分钟工作时间结束！休息一下吧~'});
}
alert('番茄钟结束！休息5分钟吧~');
}
},1000);
}
}

function pausePomodoro(){
if(pomodoroRunning){
clearInterval(pomodoroTimer);
pomodoroRunning=false;
}
}

function resetPomodoro(){
clearInterval(pomodoroTimer);
pomodoroRunning=false;
pomodoroSeconds=1500;
document.getElementById('pomodoroDisplay').textContent='25:00';
}

function showReview(){
const today=new Date().toDateString();
let html='<div style="padding:10px">';
let count=0;
['q1','q2','q3','q4'].forEach(q=>{
const completed=tasks[q].filter(t=>t.completed&&t.completedAt&&new Date(t.completedAt).toDateString()===today);
if(completed.length>0){
const names={q1:'🔥 重要且紧急',q2:'⭐ 重要不紧急',q3:'⚡ 紧急不重要',q4:'💤 不重要不紧急'};
html+=`<h4 style="margin:15px 0 10px;color:#333">${names[q]} (${completed.length})</h4>`;
completed.forEach(t=>{
html+=`<div style="padding:8px;margin:5px 0;background:#f8f9fa;border-radius:6px;border-left:3px solid #2ecc71">${t.text||t}</div>`;
count++;
});
}
});
if(count===0)html+='<p style="text-align:center;color:#999;padding:40px">今天还没有完成任务哦~</p>';
else html+=`<p style="margin-top:20px;text-align:center;color:#27ae60;font-weight:700">今日共完成 ${count} 个任务！👏</p>`;
html+='</div>';
document.getElementById('reviewContent').innerHTML=html;
document.getElementById('reviewModal').classList.add('active');
}

function showCalendar(){
let html='<div style="padding:10px">';
const tasksByDate={};
['q1','q2','q3','q4'].forEach(q=>{
tasks[q].forEach(t=>{
if(t.deadline){
const date=new Date(t.deadline).toLocaleDateString('zh-CN');
if(!tasksByDate[date])tasksByDate[date]=[];
tasksByDate[date].push({...t,quadrant:q});
}
});
});
const dates=Object.keys(tasksByDate).sort();
if(dates.length===0){
html+='<p style="text-align:center;color:#999;padding:40px">暂无设置截止日期的任务</p>';
}else{
dates.forEach(date=>{
html+=`<h4 style="margin:15px 0 10px;color:#333">${date}</h4>`;
tasksByDate[date].forEach(t=>{
const colors={q1:'#e74c3c',q2:'#3498db',q3:'#f39c12',q4:'#95a5a6'};
html+=`<div style="padding:8px;margin:5px 0;background:#f8f9fa;border-radius:6px;border-left:3px solid ${colors[t.quadrant]}">${t.text||t}</div>`;
});
});
}
html+='</div>';
document.getElementById('calendarContent').innerHTML=html;
document.getElementById('calendarModal').classList.add('active');
}

function showSummary(){
const today=new Date().toISOString().split('T')[0];
document.getElementById('summaryDate').value=today;
document.getElementById('summaryText').value=summaries[today]||'';
document.getElementById('summaryModal').classList.add('active');
}

function saveSummary(){
const date=document.getElementById('summaryDate').value;
const text=document.getElementById('summaryText').value;
if(date&&text){
summaries[date]=text;
localStorage.setItem('summaries',JSON.stringify(summaries));
alert('总结已保存！');
closeModal();
}
}

if(Notification.permission==='default'){
Notification.requestPermission();
}

renderTasks();
</script>
</body>
</html>
